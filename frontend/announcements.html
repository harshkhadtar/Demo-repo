<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Announcements - Public Issue Reporting</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" rel="stylesheet">
</head>

<body>
    <header class="top-app-bar">
        <div style="display: flex; align-items: center; gap: 12px;">
            <span class="material-symbols-outlined"
                style="color: var(--md-sys-color-primary); font-size: 32px;">campaign</span>
            <h1 data-i18n="explore">Announcements</h1>
        </div>
        <div class="app-bar-actions">
            <select id="language-select">
                <option value="en">English</option>
                <option value="mr">मराठी</option>
            </select>
        </div>
    </header>

    <main class="container">
        <div style="max-width: 800px; margin: 0 auto;" id="announcements-feed">
            <!-- Loaded via JS -->
            <p style="text-align:center; color: var(--md-sys-color-on-surface-variant);">Loading announcements...</p>
        </div>
    </main>

    <!-- Mobile Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <div class="icon-container"><span class="material-symbols-outlined">home</span></div>
            <span data-i18n="home">Home</span>
        </a>
        <a href="complaint.html" class="nav-item">
            <div class="icon-container"><span class="material-symbols-outlined">report</span></div>
            <span data-i18n="complaint">Complaint</span>
        </a>
        <a href="announcements.html" class="nav-item active">
            <div class="icon-container"><span class="material-symbols-outlined">campaign</span></div>
            <span data-i18n="explore_nav">Announcement</span>
        </a>
        <a href="data.html" class="nav-item">
            <div class="icon-container"><span class="material-symbols-outlined">analytics</span></div>
            <span data-i18n="data">Data</span>
        </a>
    </nav>

    <script src="js/i18n.js"></script>
    <script src="js/app.js"></script>
    <script>
        async function deleteAnnouncement(id) {
            if (!confirm('Are you sure you want to delete this announcement?')) return;
            const token = localStorage.getItem('token');
            try {
                const response = await fetch('https://demo-repo-9fgn.onrender.com/api/announcements/' + id, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (response.ok) {
                    alert('Announcement deleted successfully');
                    window.location.reload();
                } else {
                    const res = await response.json();
                    alert('Failed: ' + res.message);
                }
            } catch (e) {
                alert('Error deleting announcement: ' + e.message);
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const user = JSON.parse(localStorage.getItem('user'));
            const isAdmin = user && user.role === 'admin';

            try {
                const response = await fetch('https://demo-repo-9fgn.onrender.com/api/announcements');
                const data = await response.json();
console.log("API:", data);

const announcements = Array.isArray(data) ? data : [];
                const feed = document.getElementById('announcements-feed');
                feed.innerHTML = '';

                if (announcements.length === 0) {
                    feed.innerHTML = '<p style="text-align:center;">No announcements right now.</p>';
                    return;
                }

                announcements.forEach(a => {
                    const date = new Date(a.created_at).toLocaleDateString();
                    let deleteBtn = '';
                    if (isAdmin) {
                        deleteBtn = `<button class="btn-ghost" style="color:var(--md-sys-color-error, #B3261E); float:right; padding:6px 12px; border:1px solid #B3261E; border-radius:4px; font-size:14px; cursor:pointer;" onclick="deleteAnnouncement(${a.id})">Delete</button>`;
                    }
                    
                    feed.innerHTML += `
            <div class="md-card" style="margin-bottom: 24px; position:relative; overflow:hidden;">
              ${a.media_url ? `<img src="https://demo-repo-9fgn.onrender.com${a.media_url}" style="width: 100%; border-radius: 8px; max-height: 400px; object-fit: cover; margin-bottom: 12px;">` : ''}
              ${deleteBtn}
              <h3 style="margin-top:0;">${a.title}</h3>
              <p class="caption">${date}</p>
              <p style="margin-top: 8px; white-space: pre-wrap;">${a.body}</p>
            </div>
          `;
                });
            } catch (error) {
                document.getElementById('announcements-feed').innerHTML = '<p style="text-align:center;">Failed to load announcements.</p>';
            }
        });
    </script>
</body>

</html>
