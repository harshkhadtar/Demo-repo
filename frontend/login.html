<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Public Issue Reporting</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" rel="stylesheet">
</head>

<body>
    <header class="top-app-bar">
        <div style="display: flex; align-items: center; gap: 12px;">
            <span class="material-symbols-outlined"
                style="color: var(--md-sys-color-primary); font-size: 32px;">account_balance</span>
            <h1 data-i18n="app_title">Public Issue Reporting</h1>
        </div>
        <div class="app-bar-actions">
            <select id="language-select">
                <option value="en">English</option>
                <option value="mr">मराठी</option>
            </select>
        </div>
    </header>

    <main class="container">
        <div class="md-card auth-card">
            <h2 style="text-align: center; margin-bottom: 24px;" data-i18n="sign_in">Sign In</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="form-control" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" required
                        placeholder="Enter your password">
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 16px;">
                    <span data-i18n="sign_in">Sign In</span>
                </button>
            </form>
            <div style="text-align: center; margin-top: 16px;">
                <span class="caption">Don't have an account?</span> <a href="register.html"
                    style="color: var(--md-sys-color-primary); text-decoration: none; font-weight: 500;">Register</a>
            </div>
        </div>
    </main>

    <script src="js/i18n.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    if (data.user.role === 'admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'index.html';
                    }
                } else {
                    alert('Login failed: ' + data.message);
                }
            } catch (error) {
                alert('Server error. Please make sure the backend is running.');
            }
        });
    </script>
</body>

</html>
