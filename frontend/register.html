<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register – Lonere Grampanchayat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: linear-gradient(135deg, #4F46E5 0%, #818CF8 50%, #C7D2FE 100%); min-height: 100vh; display: flex; flex-direction: column; }
    .login-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .login-card {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.18);
      width: 100%; max-width: 420px;
      padding: 40px 36px;
      animation: fadeUp 0.5s ease both;
    }
    .login-brand { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
    .login-brand-icon {
      width: 44px; height: 44px; border-radius: 12px;
      background: linear-gradient(135deg, #4F46E5, #818CF8);
      display: flex; align-items: center; justify-content: center;
    }
    .login-brand-icon .material-symbols-outlined { color: #fff; font-size: 24px; }
    .login-brand-text h2 { font-size: 1rem; font-weight: 700; color: #0F172A; line-height: 1.2; }
    .login-brand-text p  { font-size: 0.75rem; color: #94A3B8; }
    .login-card h1 { font-size: 1.5rem; font-weight: 700; color: #0F172A; margin-bottom: 6px; }
    .login-card .subtitle { font-size: 0.9rem; color: #64748B; margin-bottom: 28px; }
    .input-wrap { position: relative; margin-bottom: 16px; }
    .input-wrap .input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #94A3B8; font-size: 20px; }
    .input-wrap input {
      width: 100%; padding: 13px 16px 13px 44px;
      border: 1.5px solid #E2E8F0; border-radius: 10px;
      font-size: 0.9375rem; font-family: inherit; color: #0F172A;
      background: #F8FAFF; transition: all 0.2s;
    }
    .input-wrap input:focus {
      outline: none; border-color: #4F46E5;
      background: #fff; box-shadow: 0 0 0 3px rgba(79,70,229,0.15);
    }
    .input-wrap input::placeholder { color: #94A3B8; }
    .btn-login {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #4F46E5 0%, #818CF8 100%);
      color: #fff; border: none; border-radius: 999px;
      font-size: 1rem; font-weight: 600; cursor: pointer;
      box-shadow: 0 4px 14px rgba(79,70,229,0.35);
      transition: all 0.25s; margin-top: 6px;
    }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(79,70,229,0.40); }
    .login-footer { text-align: center; font-size: 0.875rem; color: #64748B; margin-top: 20px; }
    .login-footer a { color: #4F46E5; font-weight: 600; text-decoration: none; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>

<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-brand">
        <div class="login-brand-icon">
          <span class="material-symbols-outlined">account_balance</span>
        </div>
        <div class="login-brand-text">
          <h2>Lonere Grampanchayat</h2>
          <p>Public Issue Reporting</p>
        </div>
      </div>

      <h1 data-i18n="register_heading">Create account ✨</h1>
      <p class="subtitle" data-i18n="register_subtitle">Join thousands of citizens making a difference</p>

      <form id="register-form">
        <div class="input-wrap">
          <span class="material-symbols-outlined input-icon">person</span>
          <input type="text" id="name" required placeholder="Full name">
        </div>
        <div class="input-wrap">
          <span class="material-symbols-outlined input-icon">mail</span>
          <input type="email" id="email" required placeholder="Email address">
        </div>
        <div class="input-wrap">
          <span class="material-symbols-outlined input-icon">lock</span>
          <input type="password" id="password" required placeholder="Create a password">
        </div>
        <button type="submit" class="btn-login" data-i18n="btn_create_account">Create Account</button>
      </form>

      <div class="login-footer">
        <span data-i18n="register_have_account">Already have an account?</span> <a href="login.html" data-i18n="btn_sign_in">Sign In</a>
      </div>
    </div>
  </div>

  <script src="js/i18n.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      btn.textContent = 'Creating account…'; btn.disabled = true;
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      try {
        const response = await fetch('https://demo-repo-9fgn.onrender.com/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });
        const data = await response.json();
        if (response.ok) {
          alert('Registration successful! Please login.');
          window.location.href = 'login.html';
        } else {
          alert('Registration failed: ' + data.message);
          btn.textContent = 'Create Account'; btn.disabled = false;
        }
      } catch (error) {
        alert('Server error.');
        btn.textContent = 'Create Account'; btn.disabled = false;
      }
    });
  </script>
</body>
</html>
