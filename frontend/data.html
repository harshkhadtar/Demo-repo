<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Dashboard - Public Issue Reporting</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" rel="stylesheet">
</head>

<body>
    <header class="top-app-bar">
        <div style="display: flex; align-items: center; gap: 12px;">
            <span class="material-symbols-outlined"
                style="color: var(--md-sys-color-primary); font-size: 32px;">analytics</span>
            <h1>Data</h1>
        </div>
    </header>

    <main class="container">

        <section style="text-align: center; margin-bottom: 24px;">
            <h2>Public Issue Analytics</h2>
            <p>Live overview of all complaints.</p>
        </section>

        <!-- Stats -->
        <section class="grid-2">
            <div class="md-card" style="text-align:center;">
                <h3 id="stat-total">0</h3>
                <p>Total Complaints</p>
            </div>

            <div class="md-card">
                <div>Pending: <strong id="stat-pending">0</strong></div>
                <div>In Progress: <strong id="stat-inprogress">0</strong></div>
                <div>Completed: <strong id="stat-completed">0</strong></div>
                <div>Rejected: <strong id="stat-rejected">0</strong></div>
            </div>
        </section>

        <!-- Charts -->
        <section class="grid-2">
            <div class="md-card">
                <h3>Status Overview</h3>
                <canvas id="statusChart"></canvas>
            </div>

            <div class="md-card">
                <h3>Category Overview</h3>
                <canvas id="categoryChart"></canvas>
            </div>
        </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch('https://demo-repo-9fgn.onrender.com/api/complaints/all');
                const data = await response.json();

                console.log("API RESPONSE:", data);

                // Handle both formats
                const complaints = Array.isArray(data) ? data : data.complaints;

                if (!Array.isArray(complaints)) {
                    throw new Error("Complaints is not an array");
                }

                let pending = 0, inprogress = 0, completed = 0, rejected = 0;
                let categories = {};

                complaints.forEach(c => {
                    if (c.status === 'Pending') pending++;
                    if (c.status === 'In Progress') inprogress++;
                    if (c.status === 'Completed') completed++;
                    if (c.status === 'Rejected') rejected++;

                    categories[c.category] = (categories[c.category] || 0) + 1;
                });

                // Stats
                document.getElementById('stat-total').textContent = complaints.length;
                document.getElementById('stat-pending').textContent = pending;
                document.getElementById('stat-inprogress').textContent = inprogress;
                document.getElementById('stat-completed').textContent = completed;
                document.getElementById('stat-rejected').textContent = rejected;

                // ✅ STATUS CHART
                new Chart(document.getElementById('statusChart'), {
                    type: 'doughnut',
                    data: {
                        labels: ['Pending', 'In Progress', 'Completed', 'Rejected'],
                        datasets: [{
                            data: [pending, inprogress, completed, rejected]
                        }]
                    }
                });

                // ✅ CATEGORY CHART
                new Chart(document.getElementById('categoryChart'), {
                    type: 'bar',
                    data: {
                        labels: Object.keys(categories),
                        datasets: [{
                            label: 'Complaints',
                            data: Object.values(categories)
                        }]
                    }
                });

            } catch (error) {
                console.error('❌ Failed to load data', error);
            }
        });
    </script>

</body>
</html>
